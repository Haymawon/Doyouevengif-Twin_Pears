<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ihykilysm</title>
  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000; 
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, 'Inter', -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      
      
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    
    .fullscreen-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('93dbc2c52df623e4fd95b455601d50b8.jpg'); 
      background-size: contain;      
      background-position: center;
      background-repeat: no-repeat;
      background-color: #0a0a0a;    
      z-index: 1;
    }

    
    .verse-overlay {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      
    }


    .lyrics-pure {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-width: 90%;
    }

    
    .verse-line {
      display: block;
      font-weight: 560;
      font-size: clamp(1.4rem, 7vw, 2.8rem);
      letter-spacing: -0.01em;
      line-height: 1.35;
      color: #fffef7;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6), 0 1px 2px rgba(0, 0, 0, 0.8);
      font-family: inherit;
      white-space: normal;
      word-break: keep-all;
    }

    
    .verse-line:last-child {
      font-style: italic;
      font-weight: 550;
      letter-spacing: 0.2px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.7);
    }

    
    @media (max-width: 560px) {
      .verse-line {
        font-size: clamp(1.2rem, 6.5vw, 2rem);
        line-height: 1.4;
      }
      .verse-overlay {
        padding: 1rem;
      }
    }

    @media (max-width: 420px) {
      .verse-line {
        font-size: clamp(1rem, 5.8vw, 1.7rem);
      }
      .lyrics-pure {
        gap: 0.3rem;
      }
    }

    
    @media (max-height: 500px) and (orientation: landscape) {
      .verse-line {
        font-size: clamp(1rem, 5vh, 1.9rem);
      }
      .verse-overlay {
        padding: 0.8rem;
      }
    }

    /
    .verse-line {
      user-select: text;
    }
    
    .fullscreen-image, .verse-overlay {
      outline: none;
    }
  </style>
</head>
<body>
  
  <div class="fullscreen-image"></div>

  <div class="verse-overlay">
    <div class="lyrics-pure">
      <span class="verse-line">I guess I gotta go</span>
      <span class="verse-line">I guess it's time to go</span>
      <span class="verse-line">I gotta let you go</span>
      <span class="verse-line">I'm so devoted</span>
    </div>
  </div>

</body>
</html>
