<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Left weight (anime eye outline) -->
  <circle cx="22" cy="50" r="16" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <circle cx="22" cy="50" r="10" fill="none" stroke="#2C3E50" stroke-width="2.5"/>
  <circle cx="22" cy="50" r="4.5" fill="none" stroke="#2C3E50" stroke-width="2.5"/>
  <circle cx="22" cy="46" r="1.8" fill="#2C3E50"/> <!-- pupil highlight (solid dot) -->
  
  <!-- Bar -->
  <rect x="40" y="47" width="20" height="6" rx="2" fill="#2C3E50"/>
  
  <!-- Right weight (simple circle) -->
  <circle cx="78" cy="50" r="16" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <!-- optional inner ring for detail -->
  <circle cx="78" cy="50" r="10" fill="none" stroke="#2C3E50" stroke-width="2.5"/>
</svg>