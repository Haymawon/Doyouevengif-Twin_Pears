<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: rgb(42, 27, 61); display: block; margin: 0 auto;">
  <defs>
    <!-- Gradients using the Unspoken Ache palette -->
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a86af0" />
      <stop offset="100%" stop-color="#5d3a9b" />
    </linearGradient>
    
    <linearGradient id="pathGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4c7ff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.5" />
    </linearGradient>
    
    <radialGradient id="lightGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#a86af0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#a86af0" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="archGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b18aff" />
      <stop offset="100%" stop-color="#7d5dd9" />
    </linearGradient>
    
    <!-- Glow filter using purple tones -->
    <filter id="gateGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#a86af0" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="screen"/>
    </filter>
    
    <!-- Bird shape -->
    <path id="bird" d="M0,0 Q5,-8 10,0 Q15,8 10,10 Q5,15 0,10 Q-5,15 -10,10 Q-15,8 -10,0 Q-5,-8 0,0Z" fill="#d4c7ff"/>
    
    <!-- Crackle pattern from The Unspoken Ache -->
    <pattern id="crackle" width="0.15" height="0.15" patternUnits="objectBoundingBox">
      <path d="M0,0.1 L0.1,0 M0.05,0 L0.05,0.15 M0.15,0.05 L0,0.05" stroke="#d4c7ff" stroke-width="0.008" opacity="0.4" />
    </pattern>
  </defs>
  
  <!-- Background elements -->
  <rect width="100%" height="100%" fill="url(#lightGradient)" opacity="0.3"/>
  
  <!-- Path leading to the gate -->
  <path d="M400,600 L400,300" stroke="url(#pathGradient)" stroke-width="200" stroke-linecap="round"/>
  
  <!-- Gate structure -->
  <g transform="translate(400, 300)">
    <!-- Gate arch -->
    <path d="M-120,-150 Q0,-220 120,-150" stroke="url(#archGradient)" stroke-width="15" fill="none" stroke-linecap="round" filter="url(#gateGlow)"/>
    
    <!-- Left gate door with crackle pattern -->
    <path d="M-120,-150 L-120,150 L-50,120 L-50,-120 Z" fill="url(#crackle)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-20" dur="12s" begin="0s" repeatCount="indefinite" additive="sum" origin="-120,0"/>
    </path>
    
    <!-- Right gate door with crackle pattern -->
    <path d="M120,-150 L120,150 L50,120 L50,-120 Z" fill="url(#crackle)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="20" dur="12s" begin="0s" repeatCount="indefinite" additive="sum" origin="120,0"/>
    </path>
    
    <!-- Gate frame -->
    <path d="M-120,-150 L-120,150" stroke="#7d5dd9" stroke-width="8" stroke-linecap="round"/>
    <path d="M120,-150 L120,150" stroke="#7d5dd9" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Gate details -->
    <circle cx="-80" cy="-100" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
    <circle cx="-80" cy="0" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
    <circle cx="-80" cy="100" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
    
    <circle cx="80" cy="-100" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
    <circle cx="80" cy="0" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
    <circle cx="80" cy="100" r="8" fill="#b18aff" filter="url(#gateGlow)"/>
  </g>
  
  <!-- Light rays emanating from the gate -->
  <g transform="translate(400, 300)" opacity="0.5">
    <path d="M-50,0 L-200,300" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M0,0 L0,-300" stroke="#d4c7ff" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M50,0 L200,300" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M-30,0 L-100,-200" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M30,0 L100,-200" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0.4"/>
  </g>
  
  <!-- Floating particles / sparks from Unspoken Ache -->
  <g fill="#d4c7ff" opacity="0.3">
    <circle cx="200" cy="150" r="2">
      <animate attributeName="cy" values="150;140;150" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="250" r="1.5">
      <animate attributeName="cy" values="250;245;250" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="100" r="2.5">
      <animate attributeName="cy" values="100;90;100" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="200" r="1.8">
      <animate attributeName="cy" values="200;190;200" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="180" r="2.2">
      <animate attributeName="cy" values="180;170;180" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Birds flying toward the light -->
  <g transform="translate(400, 300)">
    <use href="#bird" x="300" y="-200" opacity="0.8">
      <animateMotion path="M0,0 Q-100,-50 -300,-100" dur="15s" repeatCount="indefinite"/>
    </use>
    <use href="#bird" x="250" y="-150" opacity="0.7" transform="scale(0.8)">
      <animateMotion path="M0,0 Q-120,-30 -300,-50" dur="18s" repeatCount="indefinite"/>
    </use>
    <use href="#bird" x="200" y="-100" opacity="0.6" transform="scale(0.6)">
      <animateMotion path="M0,0 Q-150,-20 -300,-30" dur="20s" repeatCount="indefinite"/>
    </use>
  </g>
  
  <!-- Floating keys with crackle pattern -->
  <g transform="translate(400, 300)" stroke="#b18aff" stroke-width="1.5" fill="url(#crackle)">
    <!-- Left key -->
    <g transform="translate(-200, 150)">
      <circle cx="0" cy="0" r="8"/>
      <rect x="-1" y="0" width="2" height="40" rx="1"/>
      <rect x="-15" y="40" width="30" height="5" rx="2.5"/>
      <rect x="-8" y="40" width="16" height="15" rx="3"/>
      
      <animateTransform attributeName="transform" type="translate" values="-200,150; -220,130; -200,150" dur="8s" repeatCount="indefinite"/>
    </g>
    
    <!-- Right key -->
    <g transform="translate(200, 100)">
      <circle cx="0" cy="0" r="8"/>
      <rect x="-1" y="0" width="2" height="40" rx="1"/>
      <path d="M0,40 L-10,50 L10,50 Z"/>
      
      <animateTransform attributeName="transform" type="translate" values="200,100; 230,80; 200,100" dur="10s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Subtle pulse at the gate center (from Unspoken Ache) -->
  <circle cx="400" cy="300" r="5" fill="#d4c7ff" opacity="0">
    <animate attributeName="r" values="5;80;5" dur="10s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;0.2;0" dur="10s" repeatCount="indefinite" />
  </circle>
</svg>