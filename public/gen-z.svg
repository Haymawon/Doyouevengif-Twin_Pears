<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a86af0" />
      <stop offset="100%" stop-color="#5d3a9b" />
    </linearGradient>
    
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#ff3d7f" />
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#3a7bd5" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9a3d" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#d4c7ff" flood-opacity="0.7" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="screen"/>
    </filter>
    
    <!-- TikTok logo gradient -->
    <linearGradient id="tiktokGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0050" />
      <stop offset="50%" stop-color="#00f2ea" />
      <stop offset="100%" stop-color="#ff0050" />
    </linearGradient>
    
    <!-- Instagram logo gradient -->
    <radialGradient id="instagramGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#f09433" />
      <stop offset="25%" stop-color="#e6683c" />
      <stop offset="50%" stop-color="#dc2743" />
      <stop offset="75%" stop-color="#cc2366" />
      <stop offset="100%" stop-color="#bc1888" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="rgb(42, 27, 61)" />
  
  <!-- Center circle -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#purpleGradient)" stroke-width="2" stroke-dasharray="10,5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite" />
  </circle>
  
  <!-- Floating text elements -->
  <g font-family="'Arial Rounded MT Bold', 'Arial', sans-serif" font-weight="bold" text-anchor="middle" filter="url(#textGlow)">
    <!-- RIZZ -->
    <text x="110" y="130" font-size="28" fill="url(#pinkGradient)" transform="rotate(-10,110,130)">
      rizz
      <animate attributeName="y" values="130;125;130" dur="3s" repeatCount="indefinite" />
    </text>
    
    <!-- W -->
    <text x="290" y="150" font-size="36" fill="url(#blueGradient)" transform="rotate(8,290,150)">
      W
      <animate attributeName="y" values="150;145;150" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="font-size" values="36;40;36" dur="1.5s" repeatCount="indefinite" />
    </text>
    
    <!-- DIH -->
    <text x="200" y="100" font-size="24" fill="#d4c7ff" transform="rotate(-5,200,100)">
      dih
      <animate attributeName="y" values="100;95;100" dur="4s" repeatCount="indefinite" />
    </text>
    
    <!-- PMO -->
    <text x="150" y="250" font-size="26" fill="url(#orangeGradient)" transform="rotate(15,150,250)">
      pmo
      <animate attributeName="y" values="250;245;250" dur="3.5s" repeatCount="indefinite" />
    </text>
    
    <!-- BUSSIN -->
    <text x="250" y="280" font-size="30" fill="url(#purpleGradient)" transform="rotate(-12,250,280)">
      bussin
      <animate attributeName="y" values="280;275;280" dur="3s" repeatCount="indefinite" />
    </text>
  </g>
  
  <!-- TikTok logo -->
  <g transform="translate(120, 300)">
    <path d="M0,0 Q10,-15 0,-30 Q-10,-15 0,0 Z" fill="url(#tiktokGradient)" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M-15,-10 L-15,-25" stroke="url(#tiktokGradient)" stroke-width="4" stroke-linecap="round">
      <animate attributeName="opacity" values="0.9;0.7;0.9" dur="2s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Instagram logo -->
  <g transform="translate(280, 300)">
    <rect x="-20" y="-20" width="40" height="40" rx="10" fill="none" stroke="url(#instagramGradient)" stroke-width="4" opacity="0.9">
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="3s" repeatCount="indefinite" />
    </rect>
    <circle cx="0" cy="0" r="8" fill="none" stroke="url(#instagramGradient)" stroke-width="4" opacity="0.9" />
    <circle cx="10" cy="-10" r="3" fill="url(#instagramGradient)" opacity="0.9">
      <animate attributeName="r" values="3;4;3" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Floating particles -->
  <g fill="#d4c7ff" opacity="0.5">
    <circle cx="50" cy="50" r="2">
      <animate attributeName="cy" values="50;40;50" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="350" cy="80" r="3">
      <animate attributeName="cx" values="350;340;350" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="350" r="2.5">
      <animate attributeName="cy" values="350;340;350" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="200" r="3">
      <animate attributeName="cx" values="100;110;100" dur="4.5s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Pulse effect -->
  <circle cx="200" cy="200" r="0" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0" fill="none">
    <animate attributeName="r" values="0;180;0" dur="8s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite" />
  </circle>
</svg>