<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: linear-gradient(135deg, #2c0b45, #5c2a9d); display: block; margin: 0 auto;">
  <defs>
    <!-- Purple cosmic gradients -->
    <linearGradient id="portalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    
    <radialGradient id="voidGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2c0b45" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="particleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Purple glow effects -->
    <filter id="portalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#9d4edd" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Consciousness particle -->
    <path id="consciousness" d="M0,0 C5,-8 10,-5 12,0 C10,5 5,8 0,6 C-5,8 -10,5 -12,0 C-10,-5 -5,-8 0,0Z" fill="url(#particleGradient)"/>
    
    <!-- Floating cube -->
    <g id="realityCube" stroke="#c77dff" stroke-width="1.5" fill="none">
      <path d="M-20,-20 L20,-20 L20,20 L-20,20 Z"/>
      <path d="M-20,-20 L-30,-30"/>
      <path d="M20,-20 L30,-30"/>
      <path d="M20,20 L30,10"/>
      <path d="M-20,20 L-30,10"/>
    </g>
  </defs>
  
  <!-- Cosmic background -->
  <rect width="100%" height="100%" fill="url(#voidGradient)"/>
  
  <!-- Starfield -->
  <g fill="#e0c3fc" opacity="0.5">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="700" cy="130" r="1.5"/>
    <circle cx="300" cy="40" r="1.8"/>
    <circle cx="550" cy="90" r="1.3"/>
    <circle cx="250" cy="180" r="1.0"/>
    <circle cx="650" cy="220" r="1.6"/>
    <circle cx="400" cy="280" r="1.4"/>
    <circle cx="150" cy="350" r="1.7"/>
  </g>
  
  <!-- Existential portal -->
  <g transform="translate(400, 300)">
    <!-- Portal structure -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="url(#portalGradient)" stroke-width="4" stroke-dasharray="6 12" opacity="0.8" filter="url(#portalGlow)"/>
    
    <!-- Quantum core -->
    <circle cx="0" cy="0" r="60" fill="#2c0b45" stroke="#9d4edd" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="60;65;60" dur="7s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Event horizon -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#e0c3fc" stroke-width="1" stroke-dasharray="3 6" opacity="0.5">
      <animate attributeName="r" values="70;75;70" dur="9s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Consciousness particles -->
    <g opacity="0.9">
      <use href="#consciousness" x="0" y="-90" transform="scale(0.7)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#consciousness" x="0" y="-60" transform="scale(0.5)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="18s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#consciousness" x="0" y="-30" transform="scale(0.4)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
    </g>
    
    <!-- Central question mark -->
    <g fill="none" stroke="#e0c3fc" stroke-width="2" stroke-linecap="round">
      <path d="M0,-15 C0,-30 15,-40 30,-35" opacity="0.8"/>
      <circle cx="0" cy="10" r="5" fill="none" opacity="0.8"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="6s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Reality fragments -->
  <g opacity="0.7">
    <!-- Floating cubes -->
    <use href="#realityCube" transform="translate(150, 450)">
      <animateTransform attributeName="transform" type="translate" values="150,450; 140,440; 150,450" dur="8s" repeatCount="indefinite"/>
    </use>
    <use href="#realityCube" transform="translate(650, 380)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="650,380; 660,370; 650,380" dur="10s" repeatCount="indefinite"/>
    </use>
    
    <!-- Floating pyramid -->
    <g transform="translate(300, 500)" stroke="#d8b4fe" stroke-width="1.5" fill="none">
      <path d="M0,-30 L-20,20 L20,20 Z"/>
      <path d="M0,-30 L0,10"/>
      <animateTransform attributeName="transform" type="translate" values="300,500; 290,490; 300,500" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Consciousness streams -->
  <g stroke="url(#particleGradient)" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M100,500 Q200,300 400,300">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M700,550 Q600,350 400,300">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="18s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating existential questions -->
  <g font-family="Arial" font-size="14" fill="#e0c3fc" text-anchor="middle" opacity="0.9">
    <text x="400" y="550">
      <tspan x="400" dy="0">Do We Even Exist?</tspan>
    </text>
    <text x="200" y="200" opacity="0.7" font-size="12">
      <tspan x="200" dy="0">Am I real?</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,0; 5,-5; 0,0" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="350" opacity="0.7" font-size="12">
      <tspan x="600" dy="0">What is consciousness?</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,0; -5,-5; 0,0" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Particle flow toward portal -->
  <g fill="url(#particleGradient)">
    <circle cx="100" cy="500" r="1.5">
      <animateMotion path="M0,0 Q200,-150 300,-200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2;1.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="550" r="1.2">
      <animateMotion path="M0,0 Q150,-100 300,-200" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.2;1.8;1.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="520" r="1.8">
      <animateMotion path="M0,0 Q-200,-180 -300,-220" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;2.5;1.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating orbs -->
  <g stroke="#e0c3fc" stroke-width="0.5" fill="none" opacity="0.6">
    <circle cx="100" cy="150" r="25">
      <animate attributeName="r" values="25;30;25" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="20">
      <animate attributeName="r" values="20;25;20" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="100" r="15">
      <animate attributeName="r" values="15;20;15" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>