<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="roseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a86af0" />
      <stop offset="100%" stop-color="#5d3a9b" />
    </linearGradient>
    
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76c256" />
      <stop offset="100%" stop-color="#4caf50" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#d4c7ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d4c7ff" stop-opacity="0" />
    </radialGradient>
    
    <!-- Filters -->
    <filter id="softGlow" height="300%" width="300%" x="-75%" y="-75%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a86af0" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="screen"/>
    </filter>
    
    <!-- Rose petal -->
    <path id="petal" d="M0,0 Q2,-3 5,-1 Q6,2 3,3 Q0,4 -3,3 Q-6,2 -5,-1 Q-2,-3 0,0 Z" fill="#b18aff" />
    
    <!-- Heart -->
    <path id="heart" d="M0,0 C10,-15 20,-10 0,15 C-20,-10 -10,-15 0,0 Z" fill="#ff6b9d" />
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="rgb(42, 27, 61)" />
  
  <!-- Soft glow -->
  <circle cx="200" cy="200" r="180" fill="url(#glowGradient)" opacity="0.2" />
  
  <!-- Wild rose bush -->
  <g transform="translate(200, 300)" filter="url(#softGlow)">
    <!-- Main stem -->
    <path d="M0,-100 C10,-80 20,-50 0,0" stroke="url(#stemGradient)" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Branches -->
    <path d="M0,-80 C-30,-70 -40,-40 -50,0" stroke="url(#stemGradient)" stroke-width="3" stroke-linecap="round" fill="none" />
    <path d="M0,-60 C25,-50 35,-30 40,0" stroke="url(#stemGradient)" stroke-width="3" stroke-linecap="round" fill="none" />
    
    <!-- Thorns -->
    <g stroke="#4caf50" stroke-width="1.5" stroke-linecap="round">
      <path d="M0,-50 L5,-45" />
      <path d="M-10,-30 L-15,-25" />
      <path d="M15,-20 L20,-15" />
      <path d="M-25,0 L-30,5" />
    </g>
    
    <!-- Main rose -->
    <g transform="translate(0, -100)">
      <!-- Bud center -->
      <circle cx="0" cy="0" r="8" fill="#5d3a9b" />
      
      <!-- Inner petals -->
      <path d="M0,-8 Q-7,-12 -10,-6 Q-13,0 -7,5 Q0,10 7,5 Q13,0 10,-6 Q7,-12 0,-8 Z" fill="#d4c7ff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.9;0.8" dur="3s" repeatCount="indefinite" />
      </path>
      
      <!-- Outer petals -->
      <path d="M0,-12 Q-10,-18 -14,-10 Q-18,0 -10,8 Q0,14 10,8 Q18,0 14,-10 Q10,-18 0,-12 Z" fill="url(#roseGradient)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.95;0.9" dur="4s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="rotate" values="0; -2; 0; 2; 0" dur="8s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- Blooming roses -->
    <g transform="translate(-50, 0)">
      <circle cx="0" cy="0" r="6" fill="#5d3a9b" />
      <path d="M0,-6 Q-5,-9 -7,-5 Q-9,0 -5,4 Q0,7 5,4 Q9,0 7,-5 Q5,-9 0,-6 Z" fill="#b18aff" opacity="0.8" />
    </g>
    
    <g transform="translate(40, -20)">
      <circle cx="0" cy="0" r="5" fill="#5d3a9b" />
      <path d="M0,-5 Q-4,-8 -6,-4 Q-8,0 -4,3 Q0,6 4,3 Q8,0 6,-4 Q4,-8 0,-5 Z" fill="#b18aff" opacity="0.8" />
    </g>
    
    <!-- Falling petals -->
    <g transform="translate(0, -100)">
      <use href="#petal" transform="translate(0, 0)" opacity="0">
        <animateMotion path="M0,0 Q-5,20 -20,50" dur="10s" repeatCount="indefinite" begin="0s" />
        <animate attributeName="opacity" values="0;0.7;0" dur="10s" repeatCount="indefinite" begin="0s" />
      </use>
      <use href="#petal" transform="translate(5, 0)" opacity="0">
        <animateMotion path="M0,0 Q0,15 15,40" dur="12s" repeatCount="indefinite" begin="2s" />
        <animate attributeName="opacity" values="0;0.7;0" dur="12s" repeatCount="indefinite" begin="2s" />
      </use>
    </g>
  </g>
  
  <!-- Reaching hand -->
  <g transform="translate(200, 150)" filter="url(#softGlow)">
    <!-- Arm -->
    <path d="M0,0 C-40,30 -60,70 -70,110" stroke="#fdf0d5" stroke-width="8" stroke-linecap="round" fill="none" />
    
    <!-- Hand -->
    <g transform="translate(-70, 110)">
      <!-- Palm -->
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#fdf0d5" />
      
      <!-- Fingers -->
      <path d="M-10,-5 L-15,-15" stroke="#fdf0d5" stroke-width="4" stroke-linecap="round" />
      <path d="M-5,-8 L-8,-20" stroke="#fdf0d5" stroke-width="4" stroke-linecap="round" />
      <path d="M0,-8 L0,-20" stroke="#fdf0d5" stroke-width="4" stroke-linecap="round" />
      <path d="M5,-8 L8,-20" stroke="#fdf0d5" stroke-width="4" stroke-linecap="round" />
      <path d="M10,-5 L15,-15" stroke="#fdf0d5" stroke-width="4" stroke-linecap="round" />
      
      <!-- Motion path -->
      <animateMotion path="M0,0 Q-5,-10 -10,-20" dur="6s" repeatCount="indefinite" rotate="auto" />
    </g>
  </g>
  
  <!-- Abstract weights representing societal pressure -->
  <g stroke="#a86af0" stroke-width="2" fill="none" stroke-dasharray="4,2" opacity="0.6">
    <!-- Chain links -->
    <path d="M100,50 C120,70 140,90 160,110" />
    <path d="M300,60 C280,80 260,100 240,120" />
    
    <!-- Weights -->
    <rect x="150" y="120" width="20" height="40" rx="3" />
    <rect x="230" y="130" width="20" height="40" rx="3" />
  </g>
  
  <!-- Floating hearts representing innocent feelings -->
  <g fill="#ff6b9d" opacity="0.7">
    <use href="#heart" transform="translate(100, 80) scale(0.8)">
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="4s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="4s" repeatCount="indefinite" additive="sum" />
    </use>
    <use href="#heart" transform="translate(300, 100) scale(0.6)">
      <animate attributeName="opacity" values="0.7;0.85;0.7" dur="5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-7; 0,0" dur="5s" repeatCount="indefinite" additive="sum" />
    </use>
    <use href="#heart" transform="translate(200, 50) scale(1)">
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="3.5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3.5s" repeatCount="indefinite" additive="sum" />
    </use>
  </g>
  
  <!-- Text elements with subtle animations -->
  <g font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#d4c7ff" opacity="0.9">
    <text x="200" y="40" font-size="14" opacity="0.8">
      <tspan x="200" dy="0">Oh, the sweetness of those</tspan>
      <tspan x="200" dy="18">first innocent feelings!</tspan>
      <animate attributeName="opacity" values="0.8;0.9;0.8" dur="6s" repeatCount="indefinite" />
    </text>
    
    <text x="200" y="340" font-size="12" opacity="0.7">
      <tspan x="200" dy="0">Don't pick the wild rose</tspan>
      <tspan x="200" dy="16">before its time</tspan>
      <animate attributeName="opacity" values="0.7;0.85;0.7" dur="5s" repeatCount="indefinite" />
    </text>
  </g>
  
  <!-- Gentle pulse around the rose -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="50;70;50" dur="8s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite" />
  </circle>
</svg>