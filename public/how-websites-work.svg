<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="browserGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d3a9b" />
      <stop offset="100%" stop-color="#3a1b5d" />
    </linearGradient>
    
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a86af0" />
      <stop offset="100%" stop-color="#7d5dd9" />
    </linearGradient>
    
    <linearGradient id="databaseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4caf50" />
      <stop offset="100%" stop-color="#2e7d32" />
    </linearGradient>
    
    <linearGradient id="routerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#ff3d7f" />
    </linearGradient>
    
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#3a7bd5" />
    </linearGradient>
    
    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4c7ff" />
    </marker>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#d4c7ff" flood-opacity="0.6" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" mode="screen"/>
    </filter>
    
    <!-- Data packet -->
    <g id="dataPacket">
      <rect width="40" height="25" rx="5" fill="#d4c7ff" opacity="0.9" />
      <rect x="5" y="5" width="30" height="15" rx="3" fill="#a86af0" />
      <circle cx="15" cy="12" r="2" fill="#ffffff" />
      <circle cx="25" cy="12" r="2" fill="#ffffff" />
    </g>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="rgb(42, 27, 61)" />
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial" font-size="32" fill="#d4c7ff" font-weight="bold">
    How Websites Work
  </text>
  
  <!-- User's Browser -->
  <g transform="translate(100, 150)">
    <rect width="150" height="200" rx="10" fill="url(#browserGradient)" filter="url(#glow)" />
    <rect x="10" y="10" width="130" height="30" rx="5" fill="#3a1b5d" />
    <rect x="20" y="50" width="110" height="20" rx="3" fill="#d4c7ff" />
    <rect x="20" y="80" width="110" height="100" rx="5" fill="#f9f5ff" />
    <text x="75" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#d4c7ff">Browser</text>
    <text x="75" y="63" text-anchor="middle" font-family="Arial" font-size="12" fill="#3a1b5d">www.example.com</text>
    
    <!-- Cursor -->
    <path d="M60,110 L80,130 L70,125 L75,140 L65,135 L60,150 Z" fill="#ff6b9d">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Router -->
  <g transform="translate(325, 250)">
    <rect width="150" height="100" rx="10" fill="url(#routerGradient)" filter="url(#glow)" />
    <circle cx="30" cy="30" r="5" fill="#d4c7ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="75" cy="30" r="5" fill="#d4c7ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite" begin="0.2s" />
    </circle>
    <circle cx="120" cy="30" r="5" fill="#d4c7ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1s" repeatCount="indefinite" begin="0.4s" />
    </circle>
    <text x="75" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff">Router</text>
  </g>
  
  <!-- Web Server -->
  <g transform="translate(550, 150)">
    <rect width="150" height="200" rx="10" fill="url(#serverGradient)" filter="url(#glow)" />
    <rect x="20" y="20" width="110" height="30" rx="5" fill="#7d5dd9" />
    <rect x="30" y="60" width="90" height="15" rx="2" fill="#d4c7ff" />
    <rect x="30" y="85" width="90" height="15" rx="2" fill="#d4c7ff" />
    <rect x="30" y="110" width="90" height="15" rx="2" fill="#d4c7ff" />
    <text x="75" y="40" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff">Web Server</text>
  </g>
  
  <!-- Database -->
  <g transform="translate(550, 380)">
    <ellipse cx="75" cy="20" rx="80" ry="20" fill="url(#databaseGradient)" />
    <rect x="0" y="20" width="150" height="80" rx="5" fill="url(#databaseGradient)" />
    <rect x="30" y="40" width="90" height="15" rx="2" fill="#d4c7ff" />
    <rect x="30" y="65" width="90" height="15" rx="2" fill="#d4c7ff" />
    <text x="75" y="110" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff">Database</text>
  </g>
  
  <!-- Cloud Services -->
  <g transform="translate(325, 80)">
    <ellipse cx="75" cy="20" rx="80" ry="30" fill="url(#cloudGradient)" opacity="0.8" />
    <ellipse cx="40" cy="10" rx="30" ry="20" fill="url(#cloudGradient)" opacity="0.9" />
    <ellipse cx="110" cy="15" rx="35" ry="25" fill="url(#cloudGradient)" opacity="0.7" />
    <text x="75" y="25" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff">Cloud Services</text>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#d4c7ff" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- Browser to Router -->
    <line x1="250" y1="250" x2="325" y2="250" />
    
    <!-- Router to Server -->
    <line x1="475" y1="250" x2="550" y2="250" />
    
    <!-- Server to Database -->
    <line x1="625" y1="350" x2="625" y2="380" />
    
    <!-- Server to Cloud -->
    <line x1="625" y1="200" x2="625" y2="110" stroke-dasharray="5,3" />
    
    <!-- Cloud to Router -->
    <line x1="325" y1="110" x2="325" y2="200" stroke-dasharray="5,3" />
  </g>
  
  <!-- Data flow animations -->
  <g>
    <!-- Request from Browser to Server -->
    <use href="#dataPacket" x="200" y="240">
      <animateMotion path="M150,0 C200,50 300,50 400,0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
    </use>
    
    <!-- Response from Server to Browser -->
    <use href="#dataPacket" x="550" y="240" transform="rotate(180,550,240)">
      <animateMotion path="M-150,0 C-200,50 -300,50 -400,0" dur="4s" repeatCount="indefinite" begin="2s" />
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="2s" />
    </use>
    
    <!-- Database query -->
    <use href="#dataPacket" x="600" y="350">
      <animateMotion path="M0,30" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </use>
    
    <!-- Database response -->
    <use href="#dataPacket" x="600" y="380" transform="rotate(180,600,380)">
      <animateMotion path="M0,-30" dur="2s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="1s" />
    </use>
  </g>
  
  <!-- Explanation text -->
  <g font-family="Arial" font-size="14" fill="#d4c7ff" text-anchor="middle">
    <text x="400" y="500">1. User enters URL in browser</text>
    <text x="400" y="520">2. Request is routed through the internet</text>
    <text x="400" y="540">3. Server processes the request (may use cloud services)</text>
    <text x="400" y="560">4. Server retrieves data from database if needed</text>
    <text x="400" y="580">5. Server sends response back to browser</text>
  </g>
  
  <!-- Interactive elements -->
  <rect x="100" y="150" width="150" height="200" rx="10" fill="transparent" stroke="#d4c7ff" stroke-width="2" stroke-dasharray="5,3" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0s" />
  </rect>
  
  <rect x="550" y="150" width="150" height="200" rx="10" fill="transparent" stroke="#d4c7ff" stroke-width="2" stroke-dasharray="5,3" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="2s" />
  </rect>
  
  <!-- Background particles -->
  <g fill="#d4c7ff" opacity="0.1">
    <circle cx="50" cy="50" r="2" />
    <circle cx="750" cy="70" r="1.5" />
    <circle cx="200" cy="500" r="2.5" />
    <circle cx="600" cy="550" r="1.8" />
    <circle cx="350" cy="400" r="2.2" />
  </g>
</svg>