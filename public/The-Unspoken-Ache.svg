<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for emotional depth -->
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a86af0" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#5d3a9b" stop-opacity="0.7" />
    </linearGradient>
    
    <!-- Subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feBlend in="SourceGraphic" in2="blur" mode="lighten" />
    </filter>
    
    <!-- Fragmented pattern -->
    <pattern id="crackle" width="0.15" height="0.15" patternUnits="objectBoundingBox">
      <path d="M0,0.1 L0.1,0 M0.05,0 L0.05,0.15 M0.15,0.05 L0,0.05" stroke="#e0d6ff" stroke-width="0.008" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Dark indigo background -->
  <rect width="100%" height="100%" fill="rgb(42, 27, 61)" />

  <!-- Central abstract heart form - fractured but holding -->
  <g transform="translate(200, 200)">
    <!-- Outer crystalline structure -->
    <path d="M0,-80 C20,-100 40,-110 60,-90 C80,-70 90,-40 70,-20 C50,0 20,10 0,30 C-20,10 -50,0 -70,-20 C-90,-40 -80,-70 -60,-90 C-40,-110 -20,-100 0,-80Z" 
          fill="url(#innerGradient)" stroke="#b18aff" stroke-width="2" opacity="0.95" filter="url(#glow)" />
    
    <!-- Inner fragmentation -->
    <path d="M0,-50 C-15,-60 -25,-55 -35,-45 C-45,-35 -40,-15 -25,-5 C-10,5 10,0 20,-10 C30,-20 25,-40 0,-50Z" 
          fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7" />
    
    <!-- Crystalline fracture lines -->
    <g stroke="#d4c7ff" stroke-width="1.2" opacity="0.7">
      <line x1="-20" y1="-35" x2="-45" y2="-15" />
      <line x1="10" y1="-25" x2="25" y2="-40" />
      <line x1="5" y1="0" x2="-15" y2="15" />
    </g>
    
    <!-- Floating fragments representing suppressed expression -->
    <g fill="url(#crackle)" opacity="0.7">
      <circle cx="-50" cy="-60" r="8" />
      <circle cx="40" cy="-30" r="6" />
      <circle cx="30" cy="25" r="10" />
      <circle cx="-40" cy="40" r="7" />
    </g>
    
    <!-- Subtle pulse animation -->
    <circle cx="0" cy="0" r="5" fill="#c0a3ff" opacity="0">
      <animate attributeName="r" values="5;25;5" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.3;0" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Atmospheric particles -->
  <g fill="#d4c7ff" opacity="0.25">
    <circle cx="50" cy="90" r="1.5" />
    <circle cx="320" cy="150" r="1" />
    <circle cx="180" cy="30" r="2" />
    <circle cx="280" cy="280" r="1.2" />
    <circle cx="120" cy="340" r="1.7" />
    <circle cx="350" cy="70" r="1.3" />
    <circle cx="70" cy="200" r="1.8" />
  </g>
</svg>