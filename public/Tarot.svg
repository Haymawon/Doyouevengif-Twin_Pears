<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" style="background: linear-gradient(135deg, #0d0415, #1a0630, #2d0b52); overflow: hidden; display: block;">
    <defs>
        <!-- Gradients -->
        <radialGradient id="nebula-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#5d2e8c" stop-opacity="0.8"/>
            <stop offset="70%" stop-color="#3d1a61" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#3d1a61" stop-opacity="0"/>
        </radialGradient>
        
        <radialGradient id="planet1-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#7e3fbf"/>
            <stop offset="100%" stop-color="#5a2d8c"/>
        </radialGradient>
        
        <radialGradient id="planet2-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#9d6dd6"/>
            <stop offset="100%" stop-color="#6b3f9c"/>
        </radialGradient>
        
        <radialGradient id="planet3-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#b891eb"/>
            <stop offset="100%" stop-color="#7e57c2"/>
        </radialGradient>
        
        <radialGradient id="moon-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#d4c2fc"/>
            <stop offset="100%" stop-color="#9e88cf"/>
        </radialGradient>
        
        <linearGradient id="card-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3d1a61"/>
            <stop offset="100%" stop-color="#5d2e8c"/>
        </linearGradient>
        
        <linearGradient id="shooting-star-gradient" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="white" stop-opacity="0"/>
            <stop offset="50%" stop-color="#b794f4" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        
        <!-- Filters -->
        <filter id="blur-20">
            <feGaussianBlur stdDeviation="10" />
        </filter>
        
        <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feFlood flood-color="#b891eb" flood-opacity="0.7" result="glowColor"/>
            <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
            <feMerge>
                <feMergeNode in="glow"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- Animation keyframes -->
        <style type="text/css">
            <![CDATA[
            @keyframes twinkle {
                0%, 100% { opacity: 0.2; }
                50% { opacity: 1; }
            }
            
            @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 0.8; }
                50% { transform: scale(1.2); opacity: 1; }
            }
            
            @keyframes orbit-1 {
                0% { transform: rotate(0deg) translateX(180px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
            }
            
            @keyframes orbit-2 {
                0% { transform: rotate(120deg) translateX(220px) rotate(-120deg); }
                100% { transform: rotate(480deg) translateX(220px) rotate(-480deg); }
            }
            
            @keyframes orbit-3 {
                0% { transform: rotate(240deg) translateX(280px) rotate(-240deg); }
                100% { transform: rotate(600deg) translateX(280px) rotate(-600deg); }
            }
            
            @keyframes float {
                0%, 100% { transform: translateY(0) rotate(0deg); }
                25% { transform: translateY(-20px) rotate(2deg); }
                50% { transform: translateY(0) rotate(0deg); }
                75% { transform: translateY(-15px) rotate(-2deg); }
            }
            
            @keyframes symbol-pulse {
                0%, 100% { transform: scale(1); opacity: 0.7; }
                50% { transform: scale(1.1); opacity: 1; }
            }
            
            @keyframes constellation-glow {
                0%, 100% { opacity: 0.6; }
                50% { opacity: 1; }
            }
            
            @keyframes drift {
                0% { transform: translate(0, 0); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 0.5; }
                100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
            }
            
            @keyframes shooting-star {
                0% { transform: translate(var(--startX), var(--startY)) rotate(var(--angle)); opacity: 0; }
                10% { opacity: 1; }
                100% { transform: translate(var(--endX), var(--endY)) rotate(var(--angle)); opacity: 0; }
            }
            
            .star {
                animation: twinkle var(--duration) infinite ease-in-out;
            }
            
            .nebula {
                animation: pulse 8s infinite ease-in-out;
                transform-origin: center;
            }
            
            .planet-1 {
                animation: orbit-1 25s linear infinite;
                transform-origin: center;
            }
            
            .planet-2 {
                animation: orbit-2 35s linear infinite;
                transform-origin: center;
            }
            
            .planet-3 {
                animation: orbit-3 45s linear infinite;
                transform-origin: center;
            }
            
            .moon {
                animation: float 12s ease-in-out infinite;
            }
            
            .tarot-symbol {
                animation: symbol-pulse 6s infinite ease-in-out;
            }
            
            .constellation {
                animation: constellation-glow 4s infinite ease-in-out;
            }
            
            .dust-particle {
                animation: drift var(--duration) linear infinite;
            }
            
            .shooting-star {
                animation: shooting-star var(--duration) linear infinite;
            }
            ]]>
        </style>
    </defs>
    
    <!-- Stars background -->
    <g id="stars">
        <!-- 200 randomly placed stars with varying sizes and animation durations -->
        <circle class="star" cx="50" cy="120" r="0.8" fill="white" style="--duration: 2.5s"/>
        <circle class="star" cx="780" cy="35" r="1.2" fill="white" style="--duration: 3.8s"/>
        <circle class="star" cx="230" cy="650" r="1.5" fill="white" style="--duration: 2.1s"/>
        <!-- Additional stars omitted for brevity (200 total in actual implementation) -->
    </g>
    
    <!-- Central Nebula -->
    <circle class="nebula" cx="450" cy="350" r="150" fill="url(#nebula-gradient)" filter="url(#blur-20)"/>
    
    <!-- Planets -->
    <g class="planet planet-1">
        <circle cx="450" cy="350" r="60" fill="url(#planet1-gradient)" filter="url(#glow-purple)"/>
    </g>
    
    <g class="planet planet-2">
        <circle cx="450" cy="350" r="40" fill="url(#planet2-gradient)" filter="url(#glow-purple)"/>
    </g>
    
    <g class="planet planet-3">
        <circle cx="450" cy="350" r="30" fill="url(#planet3-gradient)" filter="url(#glow-purple)"/>
    </g>
    
    <!-- Moon -->
    <g class="moon" transform="translate(150, 500)">
        <circle cx="0" cy="0" r="50" fill="url(#moon-gradient)" filter="url(#glow-purple)"/>
        <circle cx="-20" cy="-30" r="7.5" fill="rgba(158, 136, 207, 0.4)"/>
        <circle cx="10" cy="10" r="10" fill="rgba(158, 136, 207, 0.4)"/>
        <circle cx="-30" cy="10" r="6" fill="rgba(158, 136, 207, 0.4)"/>
    </g>
    
    <!-- Tarot Cards -->
    <g class="tarot-card" style="animation-delay: 0s">
        <g transform="translate(500, 100)" class="float-animation">
            <rect x="-60" y="-100" width="120" height="200" rx="10" fill="url(#card-gradient)" filter="url(#glow-purple)"/>
            <rect x="-54" y="-94" width="108" height="188" rx="8" fill="none" stroke="#b891eb" stroke-width="2"/>
            <text class="tarot-symbol" x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="50" fill="#d4c2fc" opacity="0.8">🌙</text>
        </g>
    </g>
    
    <g class="tarot-card" style="animation-delay: -5s">
        <g transform="translate(400, 450)" class="float-animation">
            <rect x="-60" y="-100" width="120" height="200" rx="10" fill="url(#card-gradient)" filter="url(#glow-purple)"/>
            <rect x="-54" y="-94" width="108" height="188" rx="8" fill="none" stroke="#b891eb" stroke-width="2"/>
            <text class="tarot-symbol" x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="50" fill="#d4c2fc" opacity="0.8">✨</text>
        </g>
    </g>
    
    <g class="tarot-card" style="animation-delay: -10s">
        <g transform="translate(700, 250)" class="float-animation">
            <rect x="-60" y="-100" width="120" height="200" rx="10" fill="url(#card-gradient)" filter="url(#glow-purple)"/>
            <rect x="-54" y="-94" width="108" height="188" rx="8" fill="none" stroke="#b891eb" stroke-width="2"/>
            <text class="tarot-symbol" x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="50" fill="#d4c2fc" opacity="0.8">♎</text>
        </g>
    </g>
    
    <!-- Zodiac Constellations -->
    <g class="constellation" transform="translate(100, 80)">
        <line x1="10" y1="40" x2="40" y2="10" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="40" y1="10" x2="70" y2="40" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="70" y1="40" x2="90" y2="70" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="40" y1="10" x2="60" y2="60" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="10" cy="40" r="3" fill="#b891eb"/>
        <circle cx="40" cy="10" r="3" fill="#b891eb"/>
        <circle cx="70" cy="40" r="3" fill="#b891eb"/>
        <circle cx="90" cy="70" r="3" fill="#b891eb"/>
        <circle cx="60" cy="60" r="3" fill="#b891eb"/>
    </g>
    
    <g class="constellation" transform="translate(700, 550)">
        <line x1="10" y1="50" x2="30" y2="20" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="30" y1="20" x2="60" y2="40" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="60" y1="40" x2="90" y2="20" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="90" y1="20" x2="110" y2="50" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="60" y1="40" x2="60" y2="80" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="60" y1="80" x2="40" y2="90" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="60" y1="80" x2="80" y2="90" stroke="#b891eb" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="10" cy="50" r="3" fill="#b891eb"/>
        <circle cx="30" cy="20" r="3" fill="#b891eb"/>
        <circle cx="60" cy="40" r="3" fill="#b891eb"/>
        <circle cx="90" cy="20" r="3" fill="#b891eb"/>
        <circle cx="110" cy="50" r="3" fill="#b891eb"/>
        <circle cx="60" cy="80" r="3" fill="#b891eb"/>
        <circle cx="40" cy="90" r="3" fill="#b891eb"/>
        <circle cx="80" cy="90" r="3" fill="#b891eb"/>
    </g>
    
    <!-- Cosmic Dust -->
    <g id="cosmic-dust">
        <!-- 50 dust particles with random positions and movement vectors -->
        <circle class="dust-particle" cx="120" cy="230" r="1.2" fill="rgba(184, 145, 235, 0.5)" style="--dx: 50px; --dy: -30px; --duration: 15s"/>
        <circle class="dust-particle" cx="780" cy="520" r="0.8" fill="rgba(184, 145, 235, 0.5)" style="--dx: -70px; --dy: 40px; --duration: 18s"/>
        <circle class="dust-particle" cx="450" cy="350" r="1.5" fill="rgba(184, 145, 235, 0.5)" style="--dx: 20px; --dy: -50px; --duration: 22s"/>
        <!-- Additional particles omitted for brevity (50 total in actual implementation) -->
    </g>
    
    <!-- Shooting Stars -->
    <g id="shooting-stars">
        <!-- Predefined shooting stars with varying paths and timing -->
        <line class="shooting-star" x1="0" y1="0" x2="150" y2="80" stroke="url(#shooting-star-gradient)" stroke-width="2" style="--startX: 100px; --startY: 50px; --endX: 250px; --endY: 130px; --angle: 30deg; --duration: 1.8s"/>
        <line class="shooting-star" x1="0" y1="0" x2="200" y2="-100" stroke="url(#shooting-star-gradient)" stroke-width="2" style="--startX: 700px; --startY: 600px; --endX: 900px; --endY: 500px; --angle: -25deg; --duration: 2.2s"/>
        <line class="shooting-star" x1="0" y1="0" x2="180" y2="120" stroke="url(#shooting-star-gradient)" stroke-width="2" style="--startX: 300px; --startY: 100px; --endX: 480px; --endY: 220px; --angle: 40deg; --duration: 1.5s"/>
        <!-- Additional shooting stars would appear in a real implementation -->
    </g>
</svg>