<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: linear-gradient(135deg, #2c0b45, #5c2a9d); display: block; margin: 0 auto; overflow: hidden;">
  <defs>
    <!-- Purple gradients -->
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#2c0b45" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="noteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.5" />
    </linearGradient>
    
    <!-- Music note shapes -->
    <g id="musicNote">
      <path d="M0,-10 C5,-15 10,-10 15,-15 C20,-20 25,-10 30,-10 C35,-10 40,-15 40,-20 C40,-25 35,-30 30,-30 C25,-30 20,-25 15,-20 C10,-15 5,-20 0,-20 C-5,-20 -10,-15 -10,-10 C-10,-5 -5,0 0,0 C5,0 10,-5 10,-10 C10,-15 5,-20 0,-20" fill="url(#noteGradient)" opacity="0.8"/>
      <rect x="-3" y="-30" width="6" height="40" rx="3" fill="#e0c3fc"/>
    </g>
    
    <g id="quarterNote">
      <circle cx="0" cy="-15" r="6" fill="#e0c3fc"/>
      <path d="M0,-10 L0,30" stroke="#e0c3fc" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Glow effects -->
    <filter id="vocalGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#9d4edd" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Vinyl record -->
    <g id="vinyl">
      <circle cx="0" cy="0" r="40" fill="#2c0b45" stroke="#9d4edd" stroke-width="3"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="#e0c3fc" stroke-width="1" stroke-dasharray="2,4"/>
      <circle cx="0" cy="0" r="15" fill="#5c2a9d" stroke="#e0c3fc" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="5" fill="#e0c3fc"/>
      <path d="M0,-40 L0,-30 M-40,0 L-30,0 M0,40 L0,30 M40,0 L30,0" stroke="#e0c3fc" stroke-width="1.5" opacity="0.7"/>
    </g>
    
    <!-- Sound wave -->
    <path id="wave" d="M0,0 C10,-15 20,-10 30,-15 C40,-20 50,-10 60,-15 C70,-20 80,-10 90,0" fill="none"/>
  </defs>
  
  <!-- Background elements -->
  <rect width="100%" height="100%" fill="url(#spotlight)" opacity="0.4"/>
  
  <!-- Stage spotlights -->
  <circle cx="200" cy="100" r="200" fill="url(#spotlight)" opacity="0.3"/>
  <circle cx="600" cy="80" r="180" fill="url(#spotlight)" opacity="0.3"/>
  
  <!-- Floating vinyl records -->
  <g transform="translate(150, 300)">
    <use href="#vinyl">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </use>
  </g>
  
  <g transform="translate(650, 400)">
    <use href="#vinyl" transform="scale(0.8)">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="7s" repeatCount="indefinite" additive="sum"/>
    </use>
  </g>
  
  <!-- Central microphone -->
  <g transform="translate(400, 380)" filter="url(#vocalGlow)">
    <!-- Microphone stand -->
    <rect x="-5" y="20" width="10" height="150" fill="#2c0b45" rx="5"/>
    
    <!-- Microphone head -->
    <circle cx="0" cy="0" r="30" fill="url(#micGradient)"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#e0c3fc" stroke-width="2"/>
    
    <!-- Mic grille -->
    <g stroke="#e0c3fc" stroke-width="1" fill="none">
      <circle cx="0" cy="0" r="15"/>
      <circle cx="0" cy="0" r="10"/>
      <line x1="-15" y1="0" x2="15" y2="0"/>
      <line x1="0" y1="-15" x2="0" y2="15"/>
      <line x1="-10" y1="-10" x2="10" y2="10"/>
      <line x1="10" y1="-10" x2="-10" y2="10"/>
    </g>
    
    <!-- Vocal waves -->
    <g transform="translate(0, -30)" stroke="url(#micGradient)" stroke-width="4" fill="none" stroke-linecap="round">
      <use href="#wave" transform="scale(1.2)">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.8s" repeatCount="indefinite"/>
      </use>
      <use href="#wave" transform="translate(0, 10) scale(1.5)">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/>
      </use>
      <use href="#wave" transform="translate(0, 20) scale(1.8)">
        <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.5s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>
  
  <!-- Floating music notes -->
  <g opacity="0.9">
    <use href="#musicNote" x="200" y="200" transform="scale(1.2)">
      <animateMotion path="M0,0 Q50,-30 100,0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
    </use>
    
    <use href="#quarterNote" x="600" y="250" transform="scale(1.1)">
      <animateMotion path="M0,0 Q-40,-20 -80,0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
    </use>
    
    <use href="#musicNote" x="300" y="150" transform="scale(1.3)">
      <animateMotion path="M0,0 Q30,40 0,80" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
    </use>
    
    <use href="#quarterNote" x="500" y="100" transform="scale(0.9)">
      <animateMotion path="M0,0 Q-30,20 -60,0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3.5s" repeatCount="indefinite"/>
    </use>
  </g>
  
  <!-- Equalizer visualization -->
  <g transform="translate(200, 500)" stroke="#e0c3fc" stroke-linecap="round" stroke-width="10" opacity="0.8">
    <!-- Bars -->
    <path d="M0,0 L0,-40">
      <animate attributeName="d" values="M0,0 L0,-40; M0,-10 L0,-50; M0,0 L0,-40" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M30,0 L30,-60">
      <animate attributeName="d" values="M30,0 L30,-60; M30,-20 L30,-80; M30,0 L30,-60" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M60,0 L60,-30">
      <animate attributeName="d" values="M60,0 L60,-30; M60,-5 L60,-35; M60,0 L60,-30" dur="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M90,0 L90,-50">
      <animate attributeName="d" values="M90,0 L90,-50; M90,-15 L90,-65; M90,0 L90,-50" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M120,0 L120,-35">
      <animate attributeName="d" values="M120,0 L120,-35; M120,-5 L120,-40; M120,0 L120,-35" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M150,0 L150,-55">
      <animate attributeName="d" values="M150,0 L150,-55; M150,-20 L150,-75; M150,0 L150,-55" dur="1.4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- R&B text with animation -->
  <g font-family="Arial" font-size="80" fill="#e0c3fc" text-anchor="middle" opacity="0.95">
    <text x="400" y="150" font-weight="bold" filter="url(#vocalGlow)">
      <tspan x="400" dy="0">R&amp;B</tspan>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="4s" repeatCount="indefinite" additive="sum"/>
    </text>
  </g>
  
  <!-- Subtitle -->
  <g font-family="Arial" font-size="24" fill="#d8b4fe" text-anchor="middle" opacity="0.85">
    <text x="400" y="200">
      <tspan x="400" dy="0">Rhythm &amp; Blues</tspan>
    </text>
  </g>
  
  <!-- Floating particles -->
  <g fill="#e0c3fc" opacity="0.5">
    <circle cx="100" cy="500" r="2">
      <animate attributeName="cy" values="500;480;500" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="550" r="1.5">
      <animate attributeName="cy" values="550;530;550" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="450" r="2.5">
      <animate attributeName="cy" values="450;430;450" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="400" r="1.8">
      <animate attributeName="cy" values="400;380;400" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Smooth background animation -->
  <rect width="100%" height="100%" fill="#5c2a9d" opacity="0">
    <animate attributeName="opacity" values="0;0.1;0" dur="15s" repeatCount="indefinite"/>
  </rect>
</svg>