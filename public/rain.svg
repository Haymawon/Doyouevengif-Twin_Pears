<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0638"/>
      <stop offset="70%" stop-color="#3c1b6a"/>
      <stop offset="100%" stop-color="#5d3a8f"/>
    </linearGradient>
    
    <!-- Raindrop shape -->
    <path id="raindrop" d="M2 0 Q4 6 2 12 Q0 6 2 0Z" fill="#a78bfa"/>
    
    <!-- Splash effect -->
    <g id="splash">
      <ellipse cx="0" cy="15" rx="2" ry="1" fill="#c4b5fd">
        <animate attributeName="ry" values="1;4;1" dur="0.6s" begin="0s" repeatCount="1"/>
        <animate attributeName="rx" values="2;5;2" dur="0.6s" begin="0s" repeatCount="1"/>
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0s" repeatCount="1"/>
      </ellipse>
      <ellipse cx="5" cy="17" rx="1.5" ry="1" fill="#c4b5fd">
        <animate attributeName="ry" values="1;3;1" dur="0.6s" begin="0.1s" repeatCount="1"/>
        <animate attributeName="rx" values="1.5;4;1.5" dur="0.6s" begin="0.1s" repeatCount="1"/>
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.1s" repeatCount="1"/>
      </ellipse>
      <ellipse cx="-5" cy="17" rx="1.5" ry="1" fill="#c4b5fd">
        <animate attributeName="ry" values="1;3;1" dur="0.6s" begin="0.1s" repeatCount="1"/>
        <animate attributeName="rx" values="1.5;4;1.5" dur="0.6s" begin="0.1s" repeatCount="1"/>
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.1s" repeatCount="1"/>
      </ellipse>
    </g>
    
    <!-- Cloud -->
    <filter id="cloud-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="lighten"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#sky)"/>
  
  <!-- Clouds -->
  <g filter="url(#cloud-glow)" opacity="0.85">
    <g id="cloud1" transform="translate(150,80)">
      <ellipse cx="0" cy="0" rx="70" ry="40" fill="#8b5cf6"/>
      <ellipse cx="40" cy="-15" rx="45" ry="30" fill="#8b5cf6"/>
      <ellipse cx="-40" cy="-10" rx="50" ry="35" fill="#8b5cf6"/>
      <ellipse cx="0" cy="20" rx="60" ry="30" fill="#8b5cf6"/>
      <animateTransform attributeName="transform" type="translate" values="150,80; 170,80; 150,80" dur="8s" repeatCount="indefinite"/>
    </g>
    
    <g id="cloud2" transform="translate(600,60)">
      <ellipse cx="0" cy="0" rx="60" ry="35" fill="#7c3aed"/>
      <ellipse cx="35" cy="-10" rx="40" ry="25" fill="#7c3aed"/>
      <ellipse cx="-35" cy="-5" rx="45" ry="30" fill="#7c3aed"/>
      <animateTransform attributeName="transform" type="translate" values="600,60; 620,60; 600,60" dur="10s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Raindrops with splash effects -->
  <g id="rain">
    <!-- Generated rain columns with staggered animations -->
    <g transform="translate(100,0)">
      <use href="#raindrop" y="-20">
        <animate attributeName="y" values="-20;500" dur="1.4s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="1.4s" repeatCount="indefinite"/>
      </use>
      <use href="#splash" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.2;1" dur="1.4s" begin="1.2s" repeatCount="indefinite"/>
      </use>
    </g>
    
    <!-- Repeat columns with different positions/delays -->
    <g transform="translate(180,0)">
      <use href="#raindrop" y="-20">
        <animate attributeName="y" values="-20;500" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="1.2s" repeatCount="indefinite"/>
        </use>
      <use href="#splash" opacity="0">
        <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.2;1" dur="1.2s" begin="1.0s" repeatCount="indefinite"/>
      </use>
    </g>
    
    <!-- Additional rain columns (total 12 columns for realistic coverage) -->
    <g transform="translate(260,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.5s" begin="0.1s" repeatCount="indefinite"/></use></g>
    <g transform="translate(340,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.3s" begin="0.4s" repeatCount="indefinite"/></use></g>
    <g transform="translate(420,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.6s" begin="0.2s" repeatCount="indefinite"/></use></g>
    <g transform="translate(500,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.4s" begin="0.5s" repeatCount="indefinite"/></use></g>
    <g transform="translate(580,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.2s" begin="0.3s" repeatCount="indefinite"/></use></g>
    <g transform="translate(660,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.5s" begin="0.6s" repeatCount="indefinite"/></use></g>
    <g transform="translate(740,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.3s" begin="0.1s" repeatCount="indefinite"/></use></g>
    <g transform="translate(50,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.4s" begin="0.7s" repeatCount="indefinite"/></use></g>
    <g transform="translate(300,0)"><use href="#raindrop"><animate attributeName="y" values="-20;500" dur="1.1s" begin="0.4s" repeatCount="indefinite"/></use></g>
  </g>
  
  <!-- Foreground elements -->
  <rect width="800" height="60" y="440" fill="#2d1b47"/>
  <rect width="800" height="20" y="460" fill="#4a2d7a"/>
</svg>