<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="motherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5d3a9b" />
      <stop offset="100%" stop-color="#2a1b3d" />
    </linearGradient>
    
    <linearGradient id="childGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a86af0" />
      <stop offset="100%" stop-color="#7d5dd9" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#d4c7ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d4c7ff" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d" />
      <stop offset="100%" stop-color="#ff3d7f" />
    </linearGradient>
    
    <!-- Filters -->
    <filter id="softGlow" height="300%" width="300%" x="-75%" y="-75%">
      <feMorphology operator="dilate" radius="2" in="SourceAlpha" result="thicken" />
      <feGaussianBlur in="thicken" stdDeviation="8" result="blurred" />
      <feFlood flood-color="#d4c7ff" result="glowColor" />
      <feComposite in="glowColor" in2="blurred" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="rgb(42, 27, 61)" />
  
  <!-- Glowing aura -->
  <circle cx="200" cy="200" r="150" fill="url(#glowGradient)" opacity="0.3">
    <animate attributeName="r" values="150;160;150" dur="8s" repeatCount="indefinite" />
  </circle>
  
  <!-- Mother figure -->
  <g transform="translate(200, 250)" filter="url(#softGlow)">
    <!-- Body -->
    <path fill="url(#motherGradient)" d="M-50,0 C-70,-70 -40,-100 0,-100 C40,-100 70,-70 50,0 C40,40 20,60 0,60 C-20,60 -40,40 -50,0 Z" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.95;0.9" dur="4s" repeatCount="indefinite" />
    </path>
    
    <!-- Head -->
    <circle cx="0" cy="-120" r="40" fill="url(#motherGradient)" />
    
    <!-- Arms -->
    <path fill="url(#motherGradient)" d="M-60,-50 C-80,-40 -100,-10 -90,10 C-85,30 -70,40 -50,40" />
    <path fill="url(#motherGradient)" d="M60,-50 C80,-40 100,-10 90,10 C85,30 70,40 50,40" />
  </g>
  
  <!-- Child figure -->
  <g transform="translate(200, 250)" filter="url(#softGlow)">
    <!-- Body -->
    <path fill="url(#childGradient)" d="M-20,-20 C-30,-40 -10,-50 0,-50 C10,-50 30,-40 20,-20 C15,0 10,10 0,10 C-10,10 -15,0 -20,-20 Z" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0,0; 0,-3; 0,0" dur="3s" repeatCount="indefinite" />
    </path>
    
    <!-- Head -->
    <circle cx="0" cy="-70" r="20" fill="url(#childGradient)" />
    
    <!-- Heart connection -->
    <g transform="translate(0, -30)">
      <path fill="url(#heartGradient)" d="M0,-20 C5,-25 10,-20 15,-15 C20,-10 15,0 0,10 C-15,0 -20,-10 -15,-15 C-10,-20 -5,-25 0,-20 Z" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.9;0.8" dur="2s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="2s" repeatCount="indefinite" additive="sum" />
      </path>
    </g>
  </g>
  
  <!-- Love particles -->
  <g fill="#ff6b9d" opacity="0.7">
    <!-- Particle 1 -->
    <circle cx="120" cy="100" r="3">
      <animate attributeName="cy" values="100;90;100" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="3s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;4;3" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Particle 2 -->
    <circle cx="280" cy="150" r="2.5">
      <animate attributeName="cy" values="150;140;150" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.9;0.7" dur="4s" repeatCount="indefinite" />
      <animate attributeName="r" values="2.5;3.5;2.5" dur="4s" repeatCount="indefinite" />
    </circle>
    
    <!-- Particle 3 -->
    <circle cx="180" cy="80" r="3.5">
      <animate attributeName="cy" values="80;70;80" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.95;0.7" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="3.5;4.5;3.5" dur="3.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Particle 4 -->
    <circle cx="220" cy="120" r="2">
      <animate attributeName="cy" values="120;110;120" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.85;0.7" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="2;3;2" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Subtle background particles -->
  <g fill="#d4c7ff" opacity="0.2">
    <circle cx="50" cy="50" r="1.5" />
    <circle cx="350" cy="70" r="1.2" />
    <circle cx="100" cy="350" r="1.7" />
    <circle cx="300" cy="320" r="1.3" />
    <circle cx="150" cy="200" r="1.8" />
  </g>
  
  <!-- Gentle pulse effect -->
  <circle cx="200" cy="250" r="50" fill="none" stroke="#d4c7ff" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="50;70;50" dur="6s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0;0.3;0" dur="6s" repeatCount="indefinite" />
  </circle>
</svg>