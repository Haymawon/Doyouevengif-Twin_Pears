<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background: linear-gradient(135deg, #2c0b45, #5c2a9d); display: block; margin: 0 auto;">
  <defs>
    <!-- Purple gradients -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    
    <radialGradient id="voidGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2c0b45" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="particleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0c3fc" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Purple glow effects -->
    <filter id="portalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#9d4edd" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Consciousness particle -->
    <path id="consciousness" d="M0,0 C5,-8 10,-5 12,0 C10,5 5,8 0,6 C-5,8 -10,5 -12,0 C-10,-5 -5,-8 0,0Z" fill="url(#particleGradient)"/>
    
    <!-- Question mark -->
    <g id="questionMark" fill="none" stroke="#e0c3fc" stroke-width="2" stroke-linecap="round">
      <path d="M0,-15 C0,-30 15,-40 30,-35"/>
      <circle cx="0" cy="10" r="5" fill="none"/>
    </g>
  </defs>
  
  <!-- Cosmic background -->
  <rect width="100%" height="100%" fill="url(#voidGradient)"/>
  
  <!-- Starfield -->
  <g fill="#e0c3fc" opacity="0.5">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="700" cy="130" r="1.5"/>
    <circle cx="300" cy="40" r="1.8"/>
    <circle cx="550" cy="90" r="1.3"/>
    <circle cx="250" cy="180" r="1.0"/>
    <circle cx="650" cy="220" r="1.6"/>
    <circle cx="400" cy="280" r="1.4"/>
    <circle cx="150" cy="350" r="1.7"/>
  </g>
  
  <!-- Central figure (silhouette of contemplation) -->
  <g transform="translate(400, 300)" opacity="0.9">
    <!-- Head -->
    <circle cx="0" cy="-60" r="40" fill="#2c0b45" stroke="#9d4edd" stroke-width="2"/>
    
    <!-- Body -->
    <path d="M0,-20 Q0,50 -30,100 Q0,90 30,100 Q0,50 0,-20" fill="#2c0b45" stroke="#9d4edd" stroke-width="2"/>
    
    <!-- Thought vortex -->
    <circle cx="0" cy="-80" r="70" fill="none" stroke="url(#mainGradient)" stroke-width="4" stroke-dasharray="6 12" opacity="0.8" filter="url(#portalGlow)">
      <animate attributeName="r" values="70;80;70" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Floating questions -->
    <g opacity="0.8">
      <use href="#questionMark" x="-100" y="-150" transform="scale(1.2)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#questionMark" x="120" y="-120" transform="scale(1.0)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#questionMark" x="0" y="-180" transform="scale(0.8)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#questionMark" x="-140" y="-100" transform="scale(0.7)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="22s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
      <use href="#questionMark" x="160" y="-170" transform="scale(0.9)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="28s" repeatCount="indefinite" additive="sum" origin="0,0"/>
      </use>
    </g>
  </g>
  
  <!-- Floating question bubbles -->
  <g stroke="#d8b4fe" stroke-width="1.5" fill="none" opacity="0.7">
    <!-- Left bubbles -->
    <g transform="translate(200, 450)">
      <circle cx="0" cy="0" r="30"/>
      <use href="#questionMark" x="0" y="0" transform="scale(1.5)"/>
      <animateTransform attributeName="transform" type="translate" values="200,450; 180,420; 200,450" dur="8s" repeatCount="indefinite"/>
    </g>
    
    <!-- Right bubbles -->
    <g transform="translate(600, 400)">
      <circle cx="0" cy="0" r="25"/>
      <use href="#questionMark" x="0" y="0" transform="scale(1.2)"/>
      <animateTransform attributeName="transform" type="translate" values="600,400; 620,370; 600,400" dur="10s" repeatCount="indefinite"/>
    </g>
    
    <!-- Center bubble -->
    <g transform="translate(400, 500)">
      <circle cx="0" cy="0" r="35"/>
      <use href="#questionMark" x="0" y="0" transform="scale(1.8)"/>
      <animateTransform attributeName="transform" type="translate" values="400,500; 400,470; 400,500" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Question stream -->
  <g stroke="url(#particleGradient)" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M50,550 Q200,400 400,300">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="15s" repeatCount="indefinite"/>
    </path>
    <path d="M750,520 Q600,400 400,300">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="18s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Particle flow toward center -->
  <g fill="url(#particleGradient)">
    <circle cx="100" cy="500" r="1.5">
      <animateMotion path="M0,0 Q200,-150 300,-200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2;1.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="550" r="1.2">
      <animateMotion path="M0,0 Q150,-100 300,-200" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.2;1.8;1.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="520" r="1.8">
      <animateMotion path="M0,0 Q-200,-180 -300,-220" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;2.5;1.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Main text -->
  <g font-family="Arial" font-size="24" fill="#e0c3fc" text-anchor="middle" opacity="0.9">
    <text x="400" y="550">
      <tspan x="400" dy="0">A Thousand Why Did I?</tspan>
    </text>
  </g>
  
  <!-- Floating why texts -->
  <g font-family="Arial" font-size="16" fill="#d8b4fe" text-anchor="middle" opacity="0.7">
    <text x="200" y="200">
      <tspan x="200" dy="0">Why did I...</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,0; 5,-5; 0,0" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="600" y="350">
      <tspan x="600" dy="0">What if I...</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,0; -5,-5; 0,0" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="300" y="100">
      <tspan x="300" dy="0">Should I have...</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Floating orbs -->
  <g stroke="#e0c3fc" stroke-width="0.5" fill="none" opacity="0.6">
    <circle cx="100" cy="150" r="25">
      <animate attributeName="r" values="25;30;25" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="250" r="20">
      <animate attributeName="r" values="20;25;20" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>